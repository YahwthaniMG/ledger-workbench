<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ledger Workbench</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg0:       #0a0a0f;
      --bg1:       #111118;
      --bg2:       #18181f;
      --bg3:       #22222c;
      --bg4:       #2c2c38;
      --border:    #2e2e3d;
      --border2:   #3d3d52;
      --text0:     #e8e8f0;
      --text1:     #a8a8c0;
      --text2:     #6a6a88;
      --accent:    #7c6af7;
      --accent2:   #9d8fff;
      --accent-bg: rgba(124,106,247,0.08);
      --green:     #3ddc84;
      --green-bg:  rgba(61,220,132,0.08);
      --red:       #ff5f6d;
      --red-bg:    rgba(255,95,109,0.08);
      --amber:     #f5a623;
      --amber-bg:  rgba(245,166,35,0.08);
      --cyan:      #50d8d7;
    }

    html, body {
      height: 100%;
      background: var(--bg0);
      color: var(--text0);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.6;
      overflow: hidden;
    }

    /* Subtle grid texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 32px 32px;
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }

    /* ── LAYOUT ── */
    .shell {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-rows: 48px 1fr;
      grid-template-columns: 220px 1fr;
      height: 100vh;
    }

    /* ── TOPBAR ── */
    .topbar {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      background: var(--bg1);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-mark {
      width: 28px;
      height: 28px;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-mark svg { width: 16px; height: 16px; }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 16px;
      letter-spacing: -0.02em;
      color: var(--text0);
    }

    .logo-text span {
      color: var(--accent2);
    }

    .topbar-sep {
      width: 1px;
      height: 20px;
      background: var(--border);
      margin: 0 4px;
    }

    .db-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 11px;
      color: var(--text1);
    }

    .db-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text2);
      transition: background 0.3s;
    }
    .db-dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .db-dot.error     { background: var(--red); }

    .topbar-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-run {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 16px;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: #fff;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-run:hover  { background: var(--accent2); }
    .btn-run:active { transform: scale(0.97); }
    .btn-run:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-clear {
      padding: 6px 12px;
      background: transparent;
      border: 1px solid var(--border2);
      border-radius: 6px;
      color: var(--text1);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-clear:hover { border-color: var(--text1); color: var(--text0); }

    .kbd {
      font-size: 10px;
      padding: 1px 5px;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 3px;
      color: var(--text2);
    }

    /* ── SIDEBAR ── */
    .sidebar {
      background: var(--bg1);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-section {
      padding: 14px 14px 8px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text2);
    }

    .table-list { flex: 1; overflow-y: auto; padding: 0 8px 8px; }

    .table-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 8px;
      border-radius: 6px;
      cursor: pointer;
      color: var(--text1);
      transition: background 0.1s, color 0.1s;
      user-select: none;
    }
    .table-item:hover { background: var(--bg3); color: var(--text0); }
    .table-item.active { background: var(--accent-bg); color: var(--accent2); }

    .table-icon {
      width: 16px;
      height: 16px;
      opacity: 0.5;
      flex-shrink: 0;
    }
    .table-item.active .table-icon { opacity: 1; }

    .table-name { font-size: 12px; }

    .sidebar-divider {
      height: 1px;
      background: var(--border);
      margin: 8px 14px;
    }

    .quick-queries { padding: 0 8px 12px; }

    .quick-label {
      padding: 6px 8px 4px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text2);
    }

    .chip {
      display: block;
      width: 100%;
      text-align: left;
      padding: 5px 8px;
      margin-bottom: 2px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 5px;
      color: var(--text2);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.1s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chip:hover {
      background: var(--bg3);
      border-color: var(--border);
      color: var(--text1);
    }

    /* ── MAIN ── */
    .main {
      display: grid;
      grid-template-rows: 1fr 1fr;
      overflow: hidden;
      background: var(--bg0);
    }

    /* ── EDITOR PANE ── */
    .editor-pane {
      display: flex;
      flex-direction: column;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .pane-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      background: var(--bg1);
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      color: var(--text2);
      flex-shrink: 0;
    }

    .pane-title {
      font-weight: 600;
      font-size: 11px;
      color: var(--text1);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .pane-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
    }

    .editor-wrap {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .line-numbers {
      width: 44px;
      padding: 14px 0;
      background: var(--bg1);
      border-right: 1px solid var(--border);
      text-align: right;
      color: var(--text2);
      font-size: 12px;
      line-height: 1.7;
      user-select: none;
      overflow: hidden;
      flex-shrink: 0;
    }

    .line-numbers span {
      display: block;
      padding-right: 10px;
    }

    .sql-editor {
      flex: 1;
      padding: 14px 16px;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      color: var(--cyan);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.7;
      caret-color: var(--accent2);
      overflow-y: auto;
    }

    .sql-editor::placeholder { color: var(--text2); }
    .sql-editor::selection  { background: rgba(124,106,247,0.25); }

    /* ── RESULTS PANE ── */
    .results-pane {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 4px 16px;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      font-size: 11px;
      flex-shrink: 0;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .status-pill.idle    { background: var(--bg3);      color: var(--text2); }
    .status-pill.success { background: var(--green-bg); color: var(--green); }
    .status-pill.error   { background: var(--red-bg);   color: var(--red);   }
    .status-pill.loading { background: var(--amber-bg); color: var(--amber); }

    .status-msg { color: var(--text2); font-size: 11px; }

    .status-time { margin-left: auto; color: var(--text2); font-size: 10px; }

    .results-body {
      flex: 1;
      overflow: auto;
      padding: 0;
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 10px;
      color: var(--text2);
    }

    .empty-state svg { opacity: 0.3; }
    .empty-state p { font-size: 12px; }

    /* Error state */
    .error-block {
      margin: 16px;
      padding: 14px 16px;
      background: var(--red-bg);
      border: 1px solid rgba(255,95,109,0.2);
      border-radius: 8px;
      color: var(--red);
      font-size: 12px;
      line-height: 1.6;
    }

    .error-block strong {
      display: block;
      margin-bottom: 4px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: 0.7;
    }

    /* Results table */
    .result-table-wrap {
      padding: 12px 16px 20px;
    }

    .result-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .result-table thead th {
      text-align: left;
      padding: 7px 12px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      color: var(--accent2);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
      position: sticky;
      top: 0;
    }

    .result-table tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .result-table tbody tr:hover { background: var(--bg2); }
    .result-table tbody tr:last-child { border-bottom: none; }

    .result-table tbody td {
      padding: 7px 12px;
      color: var(--text0);
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .cell-null {
      color: var(--text2);
      font-style: italic;
      font-size: 11px;
    }

    .cell-num  { color: var(--amber); }
    .cell-bool { color: var(--cyan);  }
    .cell-uuid {
      color: var(--text2);
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
    }

    /* Loader spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid var(--amber-bg);
      border-top-color: var(--amber);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border2); }
  </style>
</head>
<body>

<div class="shell">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="5" height="5" rx="1" fill="white" opacity="0.9"/>
          <rect x="9" y="2" width="5" height="5" rx="1" fill="white" opacity="0.5"/>
          <rect x="2" y="9" width="5" height="5" rx="1" fill="white" opacity="0.5"/>
          <rect x="9" y="9" width="5" height="5" rx="1" fill="white" opacity="0.9"/>
        </svg>
      </div>
      <span class="logo-text">Ledger<span>Workbench</span></span>
    </div>
    <div class="topbar-sep"></div>
    <div class="db-badge">
      <div class="db-dot" id="dbDot"></div>
      <span id="dbLabel">connecting...</span>
    </div>
    <div class="topbar-right">
      <span class="kbd">Ctrl+Enter</span>
      <button class="btn-clear" onclick="clearEditor()">Clear</button>
      <button class="btn-run" id="btnRun" onclick="runQuery()">
        <svg width="11" height="11" viewBox="0 0 11 11" fill="currentColor">
          <path d="M2 1.5l7 4-7 4V1.5z"/>
        </svg>
        Run
      </button>
    </div>
  </header>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-section">Tables</div>
    <div class="table-list" id="tableList">
      <div style="padding:8px;color:var(--text2);font-size:11px;">Loading...</div>
    </div>

    <div class="sidebar-divider"></div>

    <div class="quick-queries">
      <div class="quick-label">Quick queries</div>
      <button class="chip" onclick="setQuery('SELECT * FROM clientes LIMIT 10;')">SELECT clientes</button>
      <button class="chip" onclick="setQuery('SELECT * FROM cuentas LIMIT 10;')">SELECT cuentas</button>
      <button class="chip" onclick="setQuery('SELECT * FROM transacciones LIMIT 10;')">SELECT transacciones</button>
      <button class="chip" onclick="setQuery('SELECT * FROM categorias;')">SELECT categorias</button>
      <button class="chip" onclick="setQuery(`SELECT cl.nombre, cu.tipo, cu.saldo\nFROM cuentas cu\nJOIN clientes cl ON cu.cliente_id = cl.id\nORDEN BY cu.saldo DESC;`)">Saldos por cliente</button>
      <button class="chip" onclick="setQuery(`SELECT cl.nombre, COUNT(t.id) AS txns,\n  SUM(t.monto) AS total\nFROM transacciones t\nJOIN cuentas cu ON t.cuenta_id = cu.id\nJOIN clientes cl ON cu.cliente_id = cl.id\nGROUP BY cl.nombre\nORDER BY total DESC;`)">Resumen financiero</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- EDITOR -->
    <div class="editor-pane">
      <div class="pane-header">
        <div class="pane-dot"></div>
        <span class="pane-title">SQL Editor</span>
        <span style="color:var(--text2);font-size:10px;">ledger_fintech</span>
      </div>
      <div class="editor-wrap">
        <div class="line-numbers" id="lineNumbers">
          <span>1</span>
        </div>
        <textarea
          class="sql-editor"
          id="sqlEditor"
          placeholder="-- Escribe tu query SQL aqui&#10;-- Ctrl+Enter para ejecutar&#10;&#10;SELECT * FROM clientes LIMIT 10;"
          spellcheck="false"
          autocomplete="off"
          autocorrect="off"
        ></textarea>
      </div>
    </div>

    <!-- RESULTS -->
    <div class="results-pane">
      <div class="pane-header">
        <span class="pane-title">Results</span>
        <span id="rowCount" style="color:var(--text2);font-size:10px;"></span>
      </div>
      <div class="status-bar">
        <div class="status-pill idle" id="statusPill">
          <span id="statusIcon">&#9679;</span>
          <span id="statusText">idle</span>
        </div>
        <span class="status-msg" id="statusMsg"></span>
        <span class="status-time" id="statusTime"></span>
      </div>
      <div class="results-body" id="resultsBody">
        <div class="empty-state">
          <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
            <rect x="4" y="8"  width="28" height="4" rx="2" fill="currentColor"/>
            <rect x="4" y="16" width="28" height="4" rx="2" fill="currentColor"/>
            <rect x="4" y="24" width="18" height="4" rx="2" fill="currentColor"/>
          </svg>
          <p>Ejecuta una query para ver resultados</p>
        </div>
      </div>
    </div>

  </main>
</div>

<script>
  const API = 'https://ledger-api-svvr.onrender.com';

  // ── Health check ──
  async function checkHealth() {
    try {
      const r = await fetch(API + '/health');
      const d = await r.json();
      const dot   = document.getElementById('dbDot');
      const label = document.getElementById('dbLabel');
      if (d.status === 'ok') {
        dot.className   = 'db-dot connected';
        label.textContent = 'supabase · connected';
      } else {
        dot.className   = 'db-dot error';
        label.textContent = 'connection error';
      }
    } catch {
      document.getElementById('dbDot').className = 'db-dot error';
      document.getElementById('dbLabel').textContent = 'unreachable';
    }
  }

  // ── Load tables ──
  async function loadTables() {
    try {
      const r = await fetch(API + '/tables');
      const d = await r.json();
      const list = document.getElementById('tableList');
      list.innerHTML = '';
      (d.tables || []).forEach(t => {
        const el = document.createElement('div');
        el.className = 'table-item';
        el.innerHTML = `
          <svg class="table-icon" viewBox="0 0 16 16" fill="none">
            <rect x="1" y="3" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.2"/>
            <line x1="1" y1="7" x2="15" y2="7" stroke="currentColor" stroke-width="1.2"/>
            <line x1="6" y1="3" x2="6" y2="13" stroke="currentColor" stroke-width="1.2"/>
          </svg>
          <span class="table-name">${t}</span>`;
        el.onclick = () => {
          document.querySelectorAll('.table-item').forEach(i => i.classList.remove('active'));
          el.classList.add('active');
          setQuery(`SELECT * FROM ${t} LIMIT 20;`);
        };
        list.appendChild(el);
      });
    } catch {
      document.getElementById('tableList').innerHTML =
        '<div style="padding:8px;color:var(--red);font-size:11px;">Error al cargar tablas</div>';
    }
  }

  // ── Line numbers ──
  function updateLineNumbers() {
    const editor = document.getElementById('sqlEditor');
    const lines  = editor.value.split('\n').length;
    const nums   = document.getElementById('lineNumbers');
    nums.innerHTML = Array.from({length: lines}, (_, i) =>
      `<span>${i + 1}</span>`).join('');
  }

  // ── Set query ──
  function setQuery(sql) {
    document.getElementById('sqlEditor').value = sql;
    updateLineNumbers();
  }

  // ── Clear ──
  function clearEditor() {
    document.getElementById('sqlEditor').value = '';
    document.getElementById('resultsBody').innerHTML = `
      <div class="empty-state">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <rect x="4" y="8"  width="28" height="4" rx="2" fill="currentColor"/>
          <rect x="4" y="16" width="28" height="4" rx="2" fill="currentColor"/>
          <rect x="4" y="24" width="18" height="4" rx="2" fill="currentColor"/>
        </svg>
        <p>Ejecuta una query para ver resultados</p>
      </div>`;
    setStatus('idle', '', '');
    document.getElementById('rowCount').textContent = '';
    updateLineNumbers();
  }

  // ── Status ──
  function setStatus(type, text, msg) {
    const pill = document.getElementById('statusPill');
    const icon = document.getElementById('statusIcon');
    const stxt = document.getElementById('statusText');
    const smsg = document.getElementById('statusMsg');
    pill.className = `status-pill ${type}`;
    stxt.textContent = text;
    smsg.textContent = msg;
    if (type === 'loading') {
      icon.innerHTML = '<div class="spinner"></div>';
    } else {
      icon.textContent = '\u25CF';
    }
  }

  // ── Cell rendering ──
  function renderCell(val) {
    if (val === null || val === undefined)
      return `<span class="cell-null">null</span>`;
    const s = String(val);
    if (/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(s))
      return `<span class="cell-uuid">${s.substring(0,8)}&hellip;</span>`;
    if (typeof val === 'number' || /^-?\d+(\.\d+)?$/.test(s))
      return `<span class="cell-num">${s}</span>`;
    if (typeof val === 'boolean')
      return `<span class="cell-bool">${s}</span>`;
    return s;
  }

  // ── Run query ──
  async function runQuery() {
    const sql = document.getElementById('sqlEditor').value.trim();
    if (!sql) return;

    const btn = document.getElementById('btnRun');
    btn.disabled = true;
    setStatus('loading', 'executing', '');
    document.getElementById('statusTime').textContent = '';
    document.getElementById('rowCount').textContent = '';

    const t0 = Date.now();
    try {
      const r = await fetch(API + '/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sql }),
      });
      const d = await r.json();
      const ms = Date.now() - t0;
      document.getElementById('statusTime').textContent = `${ms}ms`;

      if (d.status === 'error') {
        setStatus('error', 'error', d.message);
        document.getElementById('resultsBody').innerHTML = `
          <div class="error-block">
            <strong>Error</strong>
            ${d.message}
          </div>`;
        return;
      }

      setStatus('success', 'success', d.message);

      if (!d.rows || d.rows.length === 0) {
        document.getElementById('rowCount').textContent = '0 rows';
        document.getElementById('resultsBody').innerHTML = `
          <div class="empty-state"><p>${d.message || 'Query ejecutada. Sin filas que mostrar.'}</p></div>`;
        return;
      }

      document.getElementById('rowCount').textContent = `${d.rows.length} rows · ${d.columns.length} cols`;

      const th = d.columns.map(c => `<th>${c}</th>`).join('');
      const rows = d.rows.map(row => {
        const tds = d.columns.map(c => `<td>${renderCell(row[c])}</td>`).join('');
        return `<tr>${tds}</tr>`;
      }).join('');

      document.getElementById('resultsBody').innerHTML = `
        <div class="result-table-wrap">
          <table class="result-table">
            <thead><tr>${th}</tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
    } catch (e) {
      setStatus('error', 'error', 'No se pudo conectar con el API');
      document.getElementById('resultsBody').innerHTML = `
        <div class="error-block">
          <strong>Error de red</strong>
          No se pudo conectar con el API. Verifica que el servidor este activo.
        </div>`;
    } finally {
      btn.disabled = false;
    }
  }

  // ── Keyboard shortcut ──
  document.getElementById('sqlEditor').addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      runQuery();
    }
  });

  document.getElementById('sqlEditor').addEventListener('input', updateLineNumbers);
  document.getElementById('sqlEditor').addEventListener('scroll', () => {
    document.getElementById('lineNumbers').scrollTop =
      document.getElementById('sqlEditor').scrollTop;
  });

  // ── Init ──
  checkHealth();
  loadTables();
  updateLineNumbers();
</script>
</body>
</html>
